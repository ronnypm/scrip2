version: '3.8'

services:
  scraper:
    build: .
    ports:
      - "5000:8080"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - GMAIL_EMAIL=${GMAIL_EMAIL}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - GMAIL_TO=${GMAIL_TO}
      - SCRAPER_PAGES=5
      - SCRAPER_BASE_URL=https://www.buscalibre.pe/libros-envio-express-peru_t.html
    volumes:
      - ./output:/app/output
    restart: unless-stopped

  # Para desarrollo local sin docker-compose
  # docker build -t buscalibre-scraper .
  # docker run -p 5000:8080 -e TELEGRAM_BOT_TOKEN=xxx ... buscalibre-scraper
